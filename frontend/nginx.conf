server {
    listen 80;
    server_name _;

    # Serve the frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container (stripping the /api prefix if present)
    location ~ ^/api/(me|auth|users|servers|channels|messages|dms|friends|invites|blocks|notifications|static|meta|tokens|decorations|e2ee|audit_logs|interactions)(/.*)?$ {
        # This rewrite drops the /api part before passing it. 
        # So /api/auth/register becomes /auth/register
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy direct routes just in case any part of the frontend hits them directly
    location ~ ^/(me|auth|users|servers|channels|messages|dms|friends|invites|blocks|notifications|static|meta|tokens|decorations|e2ee|audit_logs|interactions) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket connections (specifically for chat /ws)
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
