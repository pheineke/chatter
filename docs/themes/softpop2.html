<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Professional - Discord</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* M3 Tonal Palettes - Serious Professional */
            --bg-base: #F3F3F7;
            --surface: #FFFFFF;
            --surface-container: #ECECF2;
            --primary: #3F51B5;
            --on-primary: #FFFFFF;
            --secondary: #5A5D72;
            --outline: #C7C6D0;
            --text-main: #1A1B23;
            --text-sub: #44464F;
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            
            --transition: all 0.2s cubic-bezier(0, 0, 0.2, 1);
            --sidebar-width: 260px;
            --rail-width: 72px;
        }

        [data-theme="dark"] {
            --bg-base: #111114;
            --surface: #1B1B1F;
            --surface-container: #23232A;
            --primary: #B4C5FF;
            --on-primary: #002A78;
            --text-main: #E3E2E6;
            --text-sub: #C7C6D0;
            --outline: #44464F;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-main); height: 100vh; overflow: hidden; }

        /* =========================================
           MAIN LAYOUT
           ========================================= */
        .app-layout { display: flex; height: 100vh; width: 100%; }

        /* 1. NAVIGATION RAIL (Far Left) */
        .nav-rail {
            width: var(--rail-width); background: var(--surface-container);
            display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 12px;
            border-right: 1px solid var(--outline); z-index: 100;
        }
        .rail-item {
            width: 48px; height: 48px; border-radius: var(--radius-md);
            background: var(--surface); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); color: var(--text-sub); border: 1px solid transparent;
        }
        .rail-item:hover { border-color: var(--primary); color: var(--primary); }
        .rail-item.active { background: var(--primary); color: var(--on-primary); border-radius: var(--radius-lg); }

        /* 2. SIDE PANEL (Channels / DM List) */
        .side-panel {
            width: var(--sidebar-width); background: var(--surface);
            display: flex; flex-direction: column; transition: var(--transition);
        }

        /* 3. CHAT AREA */
        .chat-main {
            flex: 1; display: flex; flex-direction: column; background: var(--surface);
            border-left: 1px solid var(--outline); position: relative;
        }

        /* 4. MEMBER PANEL (Right) */
        .member-panel {
            width: 240px; background: var(--surface); border-left: 1px solid var(--outline);
            transition: var(--transition); overflow: hidden;
        }
        .member-panel.hidden { width: 0; border-left: none; }

        /* =========================================
           COMPONENTS
           ========================================= */
        .header {
            height: 64px; padding: 0 20px; display: flex; align-items: center;
            gap: 12px; border-bottom: 1px solid var(--outline);
        }

        /* User Control Bar (Bottom Left) */
        .user-control {
            margin-top: auto; padding: 12px; background: var(--surface-container);
            display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--outline);
            position: relative;
        }
        .user-info { flex: 1; overflow: hidden; }
        .user-name { font-size: 14px; font-weight: 600; white-space: nowrap; text-overflow: ellipsis; }
        .user-status { font-size: 11px; color: var(--text-sub); }

        /* Context Menu (User Settings) */
        .user-popout {
            position: absolute; bottom: 70px; left: 10px; width: 220px;
            background: var(--surface); border-radius: var(--radius-md);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); border: 1px solid var(--outline);
            display: none; padding: 8px; z-index: 200;
        }
        .user-popout.active { display: block; }
        .menu-item {
            padding: 10px 12px; border-radius: var(--radius-sm); cursor: pointer;
            font-size: 14px; display: flex; align-items: center; gap: 8px;
        }
        .menu-item:hover { background: var(--surface-container); }

        /* Search Bar */
        .search-container {
            background: var(--surface-container); border-radius: var(--radius-sm);
            display: flex; align-items: center; padding: 0 12px; height: 36px; flex: 1;
            max-width: 300px;
        }
        .search-container input {
            background: transparent; border: none; outline: none; padding-left: 8px;
            width: 100%; font-size: 14px; color: var(--text-main);
        }

        /* Chat Elements */
        .message-list { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { display: flex; gap: 16px; margin-bottom: 20px; }
        .msg-content { flex: 1; }
        .msg-author { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .msg-text { font-size: 15px; color: var(--text-main); line-height: 1.5; }

        /* Responsive */
        @media (max-width: 800px) {
            .side-panel { position: fixed; left: -332px; height: 100%; z-index: 90; box-shadow: 10px 0 20px rgba(0,0,0,0.1); }
            .side-panel.open { left: var(--rail-width); }
            .nav-rail { width: 64px; }
            .member-panel { display: none; }
        }

    </style>
</head>
<body data-theme="light">

    <div class="app-layout">
        <!-- 1. NAVIGATION RAIL -->
        <nav class="nav-rail">
            <div class="rail-item active" onclick="setView('dms')" title="Direct Messages">💬</div>
            <div style="width: 32px; height: 1px; background: var(--outline); margin: 4px 0;"></div>
            <div class="rail-item" onclick="setView('server')" title="Material Server">M</div>
            <div class="rail-item" title="Dev Community">D</div>
            
            <div class="user-control">
                <div class="rail-item" onclick="toggleUserMenu()" style="background: var(--primary); color: white;">A</div>
                <div class="user-popout" id="userMenu">
                    <div class="menu-item">🟢 Online</div>
                    <div class="menu-item">🌙 Idle</div>
                    <div class="menu-item">⛔ Do Not Disturb</div>
                    <hr style="margin: 8px 0; border: 0; border-top: 1px solid var(--outline);">
                    <div class="menu-item" onclick="toggleTheme()">🌓 Switch Theme</div>
                    <div class="menu-item">⚙️ User Settings</div>
                </div>
            </div>
        </nav>

        <!-- 2. SIDE PANEL (Dynamic List) -->
        <aside class="side-panel" id="sidePanel">
            <div class="header">
                <h2 id="sidePanelTitle" style="font-size: 18px;">Direct Messages</h2>
            </div>
            <div id="sidePanelList" style="padding: 12px; flex: 1; overflow-y: auto;">
                <!-- List items injected here -->
            </div>
            
            <div class="user-control">
                <div style="width: 36px; height: 36px; border-radius: 8px; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center;">A</div>
                <div class="user-info">
                    <div class="user-name">AndroidUser</div>
                    <div class="user-status">#8492</div>
                </div>
                <button style="background:none; border:none; cursor:pointer;" onclick="toggleUserMenu()">⚙️</button>
            </div>
        </aside>

        <!-- 3. CHAT MAIN -->
        <main class="chat-main">
            <header class="header">
                <button id="mobile-toggle" onclick="toggleMobileMenu()" style="display:none; background:none; border:none; font-size:20px;">☰</button>
                <h1 id="chat-header-title" style="font-size: 18px; flex: 1;"># general</h1>
                
                <div class="search-container">
                    <span>🔍</span>
                    <input type="text" id="searchInput" placeholder="Search messages..." oninput="handleSearch()">
                </div>

                <button class="rail-item" style="width:36px; height:36px;" onclick="toggleMembers()" title="Toggle Member List">👥</button>
            </header>

            <div class="message-list" id="messageList">
                <!-- Messages -->
            </div>

            <div style="padding: 20px;">
                <div style="background: var(--surface-container); padding: 12px 16px; border-radius: var(--radius-md); display: flex; gap: 12px;">
                    <input type="text" id="chatInput" placeholder="Message..." style="flex:1; background:transparent; border:none; outline:none; font-size:15px;">
                    <button onclick="sendMsg()" style="background:var(--primary); color:white; border:none; padding: 0 16px; border-radius: var(--radius-sm); cursor:pointer;">Send</button>
                </div>
            </div>
        </main>

        <!-- 4. MEMBER PANEL -->
        <aside class="member-panel" id="memberPanel">
            <div class="header">
                <span style="font-size: 14px; font-weight: 600;">Members</span>
            </div>
            <div style="padding: 16px;" id="memberList">
                <!-- Members injected here -->
            </div>
        </aside>
    </div>

    <script>
        const store = {
            view: 'dms', // 'dms' or 'server'
            chat: 'general',
            messages: [
                { author: 'JaneDoe', text: 'Hey, did you see the new Material 3 components?', id: 1 },
                { author: 'AndroidUser', text: 'Yeah, the refined rounding looks much better for desktop apps.', id: 2 },
                { author: 'TechSupport', text: 'Please refer to the documentation for search implementation.', id: 3 }
            ],
            dms: ['JaneDoe', 'GraphicAlex', 'MaterialBot'],
            channels: ['general', 'announcements', 'development', 'random'],
            members: ['JaneDoe', 'AndroidUser', 'TechSupport', 'GraphicAlex']
        };

        function init() {
            renderSidePanel();
            renderMessages(store.messages);
            renderMembers();
            if (window.innerWidth < 800) {
                document.getElementById('mobile-toggle').style.display = 'block';
            }
        }

        // --- View Logic ---
        function setView(view) {
            store.view = view;
            document.querySelectorAll('.rail-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('sidePanelTitle').innerText = (view === 'dms') ? 'Direct Messages' : 'Material Server';
            renderSidePanel();
            
            const firstItem = (view === 'dms') ? store.dms[0] : store.channels[0];
            switchChat(firstItem);
        }

        function renderSidePanel() {
            const list = document.getElementById('sidePanelList');
            const items = (store.view === 'dms') ? store.dms : store.channels;
            const prefix = (store.view === 'dms') ? '@ ' : '# ';
            
            list.innerHTML = items.map(item => `
                <div class="menu-item ${store.chat === item ? 'active' : ''}" 
                     style="${store.chat === item ? 'background: var(--surface-container); font-weight: 600;' : ''}"
                     onclick="switchChat('${item}')">
                    ${prefix}${item}
                </div>
            `).join('');
        }

        function switchChat(name) {
            store.chat = name;
            document.getElementById('chat-header-title').innerText = (store.view === 'dms' ? '@ ' : '# ') + name;
            renderSidePanel();
            if(window.innerWidth < 800) toggleMobileMenu();
        }

        // --- Features ---
        function handleSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = store.messages.filter(m => 
                m.text.toLowerCase().includes(term) || m.author.toLowerCase().includes(term)
            );
            renderMessages(filtered);
        }

        function renderMessages(data) {
            const container = document.getElementById('messageList');
            container.innerHTML = data.map(m => `
                <div class="msg">
                    <div style="width:40px; height:40px; border-radius:8px; background:var(--outline); flex-shrink:0;"></div>
                    <div class="msg-content">
                        <div class="msg-author">${m.author}</div>
                        <div class="msg-text">${m.text}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value) return;
            const newMsg = { author: 'AndroidUser', text: input.value, id: Date.now() };
            store.messages.push(newMsg);
            input.value = '';
            renderMessages(store.messages);
        }

        function renderMembers() {
            document.getElementById('memberList').innerHTML = store.members.map(m => `
                <div class="menu-item">🟢 ${m}</div>
            `).join('');
        }

        // --- UI Toggles ---
        function toggleMembers() {
            document.getElementById('memberPanel').classList.toggle('hidden');
        }

        function toggleUserMenu() {
            document.getElementById('userMenu').classList.toggle('active');
        }

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
            toggleUserMenu();
        }

        function toggleMobileMenu() {
            document.getElementById('sidePanel').classList.toggle('open');
        }

        init();
    </script>
</body>
</html>
